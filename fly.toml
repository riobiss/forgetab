app = "forgetab-api"
primary_region = "gru"

[build]
  dockerfile = "api/Dockerfile"

[env]
  API_PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[deploy]
  release_command = "npm run prisma:migrate:deploy"
