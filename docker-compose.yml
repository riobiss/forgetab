services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: forgetab
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    environment:
      API_INTERNAL_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "300"
      IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT}
      IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
    command: sh -c "npm install && npx prisma migrate deploy && npx prisma generate && npm run dev"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: forgetab-api
    ports:
      - "4000:4000"
    env_file:
      - .env.development
    environment:
      API_PORT: "4000"
      FRONTEND_URL: http://localhost:3000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "300"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npm run prisma:generate && npm run start"

  db:
    image: postgres:16-alpine
    container_name: forgetab-db
    restart: unless-stopped
    env_file:
      - .env.development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rpg"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  node_modules:
  api_node_modules:
  next_cache:
  postgres_data:
