services:
  - type: web
    name: forgetab-api
    runtime: docker
    plan: free
    dockerfilePath: ./api/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: API_PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
